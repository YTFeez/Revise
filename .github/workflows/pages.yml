name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "revise-plus/apps/web/**"
      - "revise-plus/packages/shared/**"
      - "revise-plus/pnpm-workspace.yaml"
      - "revise-plus/package.json"
      - "revise-plus/apps/web/vite.config.ts"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install deps
        working-directory: revise-plus
        run: pnpm install --frozen-lockfile=false

      - name: Build web
        working-directory: revise-plus
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: pnpm --filter @revise-plus/web build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: revise-plus/apps/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

